6.1 — Architecture Diagram
<svg width="680" height="720" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:Arial,sans-serif;">

<!-- LAYER 1: DATA SOURCES -->
<rect x="20" y="20" width="640" height="80" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="50" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Data sources</text>
<text x="340" y="72" text-anchor="middle" font-size="12" fill="#5F5E5A">ICU vitals · Patient records · Doctor queries · Billing transactions</text>

<!-- LAYER 2: INPUT NODES -->
<rect x="20"  y="140" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="95"  y="163" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">ICU stream</text>
<text x="95"  y="183" text-anchor="middle" font-size="12" fill="#0F6E56">Real-time vitals</text>

<rect x="190" y="140" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="265" y="163" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">EHR system</text>
<text x="265" y="183" text-anchor="middle" font-size="12" fill="#0F6E56">Patient history</text>

<rect x="360" y="140" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="435" y="163" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Doctor portal</text>
<text x="435" y="183" text-anchor="middle" font-size="12" fill="#0F6E56">Plain English queries</text>

<rect x="530" y="140" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="595" y="163" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Billing system</text>
<text x="595" y="183" text-anchor="middle" font-size="12" fill="#0F6E56">Transactions</text>

<!-- ARROWS: sources to data lake -->
<line x1="95"  y1="196" x2="95"  y2="258" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="265" y1="196" x2="265" y2="258" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="435" y1="196" x2="435" y2="258" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="595" y1="196" x2="595" y2="258" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LAYER 3: DATA LAKE -->
<rect x="20" y="260" width="640" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="287" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Data lake (raw storage)</text>
<text x="340" y="310" text-anchor="middle" font-size="12" fill="#534AB7">Amazon S3 / Azure ADLS — stores all formats: streams, JSON, CSVs, images</text>

<!-- ARROWS: data lake to storage -->
<line x1="160" y1="330" x2="120" y2="388" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="330" x2="340" y2="388" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="520" y1="330" x2="560" y2="388" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LAYER 4: STORAGE SYSTEMS -->
<rect x="20"  y="390" width="200" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="120" y="413" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Time-series DB</text>
<text x="120" y="436" text-anchor="middle" font-size="12" fill="#854F0B">InfluxDB — ICU vitals</text>

<rect x="240" y="390" width="200" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="413" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Data warehouse</text>
<text x="340" y="436" text-anchor="middle" font-size="12" fill="#854F0B">Snowflake — reports</text>

<rect x="460" y="390" width="200" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="560" y="413" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Vector database</text>
<text x="560" y="436" text-anchor="middle" font-size="12" fill="#854F0B">Pinecone — NLP search</text>

<!-- ARROWS: storage to AI layer -->
<line x1="120" y1="460" x2="120" y2="518" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="460" x2="280" y2="518" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="460" x2="400" y2="518" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="560" y1="460" x2="500" y2="518" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LAYER 5: AI / APPLICATION LAYER -->
<rect x="20"  y="520" width="200" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="120" y="543" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">ICU alert engine</text>
<text x="120" y="566" text-anchor="middle" font-size="12" fill="#993C1D">Goal 4: stream vitals</text>

<rect x="240" y="520" width="200" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="543" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">ML model</text>
<text x="340" y="566" text-anchor="middle" font-size="12" fill="#993C1D">Goal 1: readmission risk</text>

<rect x="460" y="520" width="200" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="560" y="543" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">NLP search</text>
<text x="560" y="566" text-anchor="middle" font-size="12" fill="#993C1D">Goal 2: doctor queries</text>

<!-- ARROWS: AI to dashboard -->
<line x1="120" y1="590" x2="200" y2="638" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="590" x2="340" y2="638" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="560" y1="590" x2="480" y2="638" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LAYER 6: OUTPUT DASHBOARD -->
<rect x="140" y="640" width="400" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="663" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Hospital dashboard</text>
<text x="340" y="683" text-anchor="middle" font-size="12" fill="#185FA5">Goal 3: monthly reports · alerts · search results</text>

<!-- Arrow marker -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
</svg>
